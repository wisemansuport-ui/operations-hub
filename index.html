<!doctype html>
<html lang="pt-BR" style="background-color: #0a0a0f;">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>NytzerVision - Operations Hub</title>
    <meta name="description" content="Operations Hub - Gerenciamento de operações em tempo real" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS PWA Meta Tags (CRITICAL for standalone + notifications) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NytzerVision" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Theme color (matches sidebar dark) -->
    <meta name="theme-color" content="#0a0a0f" />

    <!-- Favicons Padrão (Fallback para navegadores antigos e abas) -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png?v=20" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png?v=20" />
    <link rel="shortcut icon" href="/favicon.ico?v=20" />

    <!-- Apple Touch Icon (iOS/iPadOS - 180x180, fundo sólido obrigatório) -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=20" />

    <!-- Canonical -->
    <link rel="canonical" href="https://www.nytzervision.com" />

    <!-- OG -->
    <meta property="og:title" content="NytzerVision - Operations Hub" />
    <meta property="og:description" content="Gerenciamento de operações em tempo real" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.nytzervision.com" />
    <style>
      @keyframes fadePulse {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
      }
    </style>
  </head>

  <body style="background-color: #0a0a0f; margin: 0; min-height: 100vh;">
    <div id="root">
      <div style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background-color: #0a0a0f; font-family: system-ui, -apple-system, sans-serif;">
        <span style="color: #eab308; font-size: 12px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; animation: fadePulse 1.5s infinite ease-in-out;">Carregando...</span>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
