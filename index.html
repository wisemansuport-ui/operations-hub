<!doctype html>
<html lang="pt-BR" style="background-color: #0a0a0f;">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>NytzerVision - Operations Hub</title>
    <meta name="description" content="Operations Hub - Gerenciamento de operações em tempo real" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS PWA Meta Tags (CRITICAL for standalone + notifications) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NytzerVision" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Theme color (matches sidebar dark) -->
    <meta name="theme-color" content="#0a0a0f" />

    <!-- Favicons Padrão (Fallback para navegadores antigos e abas) -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png?v=20" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png?v=20" />
    <link rel="shortcut icon" href="/favicon.ico?v=20" />

    <!-- Apple Touch Icon (iOS/iPadOS - 180x180, fundo sólido obrigatório) -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=20" />

    <!-- Canonical -->
    <link rel="canonical" href="https://www.nytzervision.com" />

    <!-- OG -->
    <meta property="og:title" content="NytzerVision - Operations Hub" />
    <meta property="og:description" content="Gerenciamento de operações em tempo real" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.nytzervision.com" />
  </head>

  <body style="background-color: #0a0a0f; margin: 0; min-height: 100vh;">
    <div id="root">
      <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background-color: #0a0a0f; font-family: system-ui, -apple-system, sans-serif; overflow: hidden; position: fixed; inset: 0; z-index: 99999;">
        <div style="position: relative; width: 90px; height: 90px;">
          <!-- Pulsing Glow Ring -->
          <div class="pulse-glow" style="position: absolute; inset: -15px; border-radius: 24px; background: radial-gradient(circle, rgba(234, 179, 8, 0.2) 0%, rgba(234, 179, 8, 0) 70%); animation: pulse-ring 2s infinite ease-in-out;"></div>
          <!-- Logo -->
          <img src="/apple-touch-icon.png?v=17" alt="Logo" style="width: 100%; height: 100%; object-fit: cover; border-radius: 20px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6), 0 0 20px rgba(234, 179, 8, 0.15); border: 1px solid rgba(255, 255, 255, 0.05); animation: pulse-logo 2s infinite ease-in-out;" />
        </div>
        <div style="margin-top: 24px; display: flex; flex-direction: column; align-items: center; gap: 10px;">
          <span style="color: #ffffff; font-size: 15px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; opacity: 0.95; font-family: system-ui, sans-serif;">NytzerVision</span>
          <div style="display: flex; gap: 5px; align-items: center; justify-content: center; height: 6px; width: 60px;">
            <div class="loading-bar-segment" style="width: 12px; height: 3px; background-color: #eab308; border-radius: 2px; animation: segment-glow 1.5s infinite ease-in-out 0s;"></div>
            <div class="loading-bar-segment" style="width: 12px; height: 3px; background-color: #eab308; border-radius: 2px; animation: segment-glow 1.5s infinite ease-in-out 0.3s;"></div>
            <div class="loading-bar-segment" style="width: 12px; height: 3px; background-color: #eab308; border-radius: 2px; animation: segment-glow 1.5s infinite ease-in-out 0.6s;"></div>
          </div>
        </div>
      </div>
      <style>
        @keyframes pulse-ring {
          0%, 100% { transform: scale(0.95); opacity: 0.4; }
          50% { transform: scale(1.15); opacity: 0.9; }
        }
        @keyframes pulse-logo {
          0%, 100% { transform: scale(0.97); filter: drop-shadow(0 0 5px rgba(0,0,0,0.5)); }
          50% { transform: scale(1.03); filter: drop-shadow(0 0 15px rgba(234, 179, 8, 0.3)) brightness(1.05); }
        }
        @keyframes segment-glow {
          0%, 100% { opacity: 0.25; transform: scaleX(0.8); }
          50% { opacity: 1; transform: scaleX(1.3); background-color: #eab308; }
        }
      </style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
