<!doctype html>
<html lang="pt-BR" style="background-color: #0a0a0f;">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>NytzerVision - Operations Hub</title>
    <meta name="description" content="Operations Hub - Gerenciamento de operações em tempo real" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS PWA Meta Tags (CRITICAL for standalone + notifications) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NytzerVision" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Theme color (matches sidebar dark) -->
    <meta name="theme-color" content="#0a0a0f" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="192x192" href="/web-app-manifest-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/web-app-manifest-512x512.png" />
    <link rel="shortcut icon" href="/favicon.ico?v=25" />

    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Canonical -->
    <link rel="canonical" href="https://www.nytzervision.com" />

    <!-- OG -->
    <meta property="og:title" content="NytzerVision - Operations Hub" />
    <meta property="og:description" content="Gerenciamento de operações em tempo real" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.nytzervision.com" />
    <style>
      @keyframes splashFadeIn {
        from { opacity: 0; transform: scale(0.92); }
        to   { opacity: 1; transform: scale(1); }
      }
      @keyframes splashPulse {
        0%, 100% { opacity: 0.5; transform: scaleX(1); }
        50% { opacity: 1; transform: scaleX(1.15); }
      }
      #splash-wrapper {
        animation: splashFadeIn 0.4s ease-out both;
      }
    </style>
  </head>

  <body style="background-color: #0a0a0f; margin: 0; min-height: 100vh;">
    <div id="root">
      <div id="splash-wrapper" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background-color:#06060a;font-family:system-ui,-apple-system,sans-serif;">
        <!-- Logo -->
        <img
          src="/favicon.ico?v=25"
          alt="NytzerVision"
          style="width:80px;height:80px;border-radius:20px;object-fit:cover;box-shadow:0 8px 32px rgba(0,0,0,0.6),0 0 0 1px rgba(255,255,255,0.05);margin-bottom:20px;"
        />
        <!-- Brand name -->
        <span style="color:#ffffff;font-size:16px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;margin-bottom:18px;">NytzerVision</span>
        <!-- Loading dots -->
        <div style="display:flex;gap:6px;align-items:center;">
          <div style="width:5px;height:5px;border-radius:50%;background:#eab308;animation:splashPulse 1.4s ease-in-out 0s infinite;"></div>
          <div style="width:5px;height:5px;border-radius:50%;background:#eab308;animation:splashPulse 1.4s ease-in-out 0.2s infinite;"></div>
          <div style="width:5px;height:5px;border-radius:50%;background:#eab308;animation:splashPulse 1.4s ease-in-out 0.4s infinite;"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
