<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="512" height="512">
  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2A2A2A"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>

    <linearGradient id="boltGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#B0B0B0"/>
      <stop offset="50%" stop-color="#6B6B6B"/>
      <stop offset="100%" stop-color="#D0D0D0"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.6"/>
    </filter>

    <filter id="gloss" x="-20%" y="-20%" width="140%" height="140%">
      <feSpecularLighting result="specOut" specularExponent="20" lighting-color="#ffffff">
        <fePointLight x="-100" y="-100" z="200"/>
      </feSpecularLighting>
      <feComposite in="specOut" in2="SourceAlpha" operator="in" result="specOut2"/>
      <feBlend in="SourceGraphic" in2="specOut2" mode="screen"/>
    </filter>
  </defs>

  <!-- Background edge-to-edge -->
  <rect x="0" y="0" width="200" height="200" fill="url(#bgGradient)"/>

  <g transform="translate(24, 24) scale(0.76)">
    <!-- Metallic Border -->
    <rect x="6" y="6" width="188" height="188" rx="26"
          fill="none"
          stroke="#8A8A8A"
          stroke-width="3"/>

    <rect x="10" y="10" width="180" height="180" rx="22"
          fill="none"
          stroke="#2E2E2E"
          stroke-width="2"/>

    <!-- Lightning Bolt -->
    <path
      d="M112 24 L58 102 H95 L72 176 L142 90 H106 L128 24 Z"
      fill="url(#boltGradient)"
      filter="url(#shadow)"
      stroke="#D9D9D9"
      stroke-width="1.5"
      stroke-linejoin="round"
    />

    <!-- Gloss highlight -->
    <path
      d="M112 24 L58 102 H95"
      fill="none"
      stroke="rgba(255,255,255,0.45)"
      stroke-width="2"
      stroke-linecap="round"
    />
  </g>
</svg>
